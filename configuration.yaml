shell_command:
    dyson_am02: '/home/pi/Dyson/DysonSend.sh {{ dyson_command }}'

fan:
  - platform: template
    fans:
      living_room_fan:
        friendly_name: "Living Room Fan"
        unique_id: living_room_fan

        # Fan is considered on when actual speed is above 0
        value_template: >
          {{ states('sensor.dyson_am02_actual_speed') | int(0) > 0 }}

        # Convert actual Dyson speed 0–8 to Home Assistant percentage 0–100
        percentage_template: >
          {{ ((states('sensor.dyson_am02_actual_speed') | int(0)) / 8 * 100) | round(0) }}

        # Tell Home Assistant this fan has 8 discrete speeds
        speed_count: 8

        turn_on:
          - action: input_number.set_value
            target:
              entity_id: input_number.dyson_am02_target_speed
            data:
              value: 1

        turn_off:
          - action: input_number.set_value
            target:
              entity_id: input_number.dyson_am02_target_speed
            data:
              value: 0

        # Convert Home Assistant percentage back to Dyson speed 0–8
        set_percentage:
          - action: input_number.set_value
            target:
              entity_id: input_number.dyson_am02_target_speed
            data:
              value: >
                {{ (percentage | int(0) / 100 * 8) | round(0) }}



template:
  - sensor:
      - name: "Dyson AM02 Actual Speed"
        unique_id: dyson_am02_actual_speed
        state: >
          {% set power = states('sensor.small_chargers_switch_electric_consumption_w') | float(0) %}
          {% if power < 2 %}
            0
          {% elif power < 8.5 %}
            1
          {% elif power < 12.3 %}
            2
          {% elif power < 17.5 %}
            3
          {% elif power < 24 %}
            4
          {% elif power < 32 %}
            5
          {% elif power < 43 %}
            6
          {% elif power < 56 %}
            7
          {% else %}
            8
          {% endif %}

input_number:
  dyson_am02_target_speed:
    name: Dyson AMA2 target speed
    min: 0
    max: 8
    step: 1

automation:
  - alias: Change Dyson AM02 state start_stop
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.dyson_am02_actual_speed
      - platform: state
        entity_id: input_number.dyson_am02_target_speed
    condition:
      - condition: template
        value_template: >
          {% set actual = states('sensor.dyson_am02_actual_speed') | int(0) %}
          {% set target = states('input_number.dyson_am02_target_speed') | int(0) %}
          {{ (actual == 0 and target != 0) or (actual != 0 and target == 0) }}
    action:
      - service: shell_command.dyson_am02
        data:
          dyson_command: START_STOP
          
  - alias: Change Dyson AM02 state up down
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.dyson_am02_actual_speed
      - platform: state
        entity_id: input_number.dyson_am02_target_speed
    condition:
      - condition: template
        value_template: >
          {% set actual = states('sensor.dyson_am02_actual_speed') | int(0) %}
          {% set target = states('input_number.dyson_am02_target_speed') | int(0) %}
          {{ actual != 0 and target != 0 and actual != target }}
    action:
      - repeat:
          while:
            - condition: template
              value_template: >
                {% set actual = states('sensor.dyson_am02_actual_speed') | int(0) %}
                {% set target = states('input_number.dyson_am02_target_speed') | int(0) %}
                {{ actual != 0 and target != 0 and actual != target and repeat.index <= 10 }}
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: >
                        {{ states('sensor.dyson_am02_actual_speed') | int(0)
                           > states('input_number.dyson_am02_target_speed') | int(0) }}
                  sequence:
                    - service: shell_command.dyson_am02
                      data:
                        dyson_command: SPEED_DOWN

              default:
                - service: shell_command.dyson_am02
                  data:
                    dyson_command: SPEED_UP

            - delay:
                seconds: 10
